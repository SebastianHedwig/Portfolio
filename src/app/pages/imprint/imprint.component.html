<main class="legal-page section">
  <div class="section__inner stage-shell legal-page__shell">
    <header class="stage-shell__header legal-page__header">
      <app-secondary-button
        label="Schliessen"
        size="compact"
        direction="left"
        (clicked)="closePage()"
      />
      <p class="stage-shell__eyebrow legal-page__eyebrow">Legal</p>
      <h1 class="stage-shell__title legal-page__title">Impressum</h1>
      <p class="stage-shell__lead legal-page__lead">
        Diese Seite ist vorbereitet und wird mit deinem finalen Impressumstext vervollstaendigt.
      </p>
    </header>

    <div class="legal-page__content">
      @for (section of sections; track section.title) {
        <section class="legal-page__panel">
          <h2 class="legal-page__section-title">{{ section.title }}</h2>
          @for (paragraph of section.paragraphs; track paragraph) {
            <p class="legal-page__paragraph">{{ paragraph }}</p>
          }
        </section>
      }
    </div>
  </div>
</main>
