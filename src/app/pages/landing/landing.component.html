@if (isMobileLayout()) {
  <app-mobile-header></app-mobile-header>
} @else {
  <app-desktop-header></app-desktop-header>
}

<main class="landing-page">
  <section class="landing-stage section section--hero" id="hero" aria-labelledby="hero-title" tabindex="-1">
    <app-hero></app-hero>
  </section>

  <section class="landing-stage section section--about" id="about" aria-labelledby="about-title" tabindex="-1">
    @defer (on idle) {
      <app-about></app-about>
    }
  </section>

  <section class="landing-stage section section--tech-stack" id="tech-stack" aria-labelledby="tech-stack-title" tabindex="-1">
    @defer (on idle) {
      <app-tech-stack></app-tech-stack>
    }
  </section>

  <section class="landing-stage section section--projects" id="projects" aria-labelledby="projects-title" tabindex="-1">
    @defer (on idle) {
      <app-projects></app-projects>
    }
  </section>

  <section class="landing-stage section section--case-studies" id="case-studies" aria-labelledby="case-studies-title" tabindex="-1">
    @defer (on idle) {
      <app-case-studies></app-case-studies>
    }
  </section>

  <section class="landing-stage section section--references" id="references" aria-labelledby="references-title" tabindex="-1">
    @defer (on idle) {
      <app-references></app-references>
    }
  </section>

  <section class="landing-stage section section--contact" id="contact" aria-labelledby="contact-title" tabindex="-1">
    @defer (on idle) {
      <app-contact></app-contact>
    }
  </section>

  <section class="landing-stage section section--legal" id="legal" aria-label="Footer">
    @defer (on idle) {
      @if (isMobileLayout()) {
        <app-mobile-footer></app-mobile-footer>
      } @else {
        <app-desktop-footer></app-desktop-footer>
      }
    }
  </section>
</main>
