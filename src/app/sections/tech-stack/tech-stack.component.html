  <app-tech-stack-text-block

  ></app-tech-stack-text-block>

  <app-tech-stack-stack-group
    data-scroll-reveal
    data-scroll-reveal-start="top 144%"
    data-scroll-reveal-end="top 88%"

  ></app-tech-stack-stack-group>

  <app-tech-stack-learning-item
    data-scroll-reveal
    data-scroll-reveal-start="top 146%"
    data-scroll-reveal-end="top 90%"

  <app-tech-stack-text-block
    data-scroll-reveal
    data-scroll-reveal-start="top 146%"
    data-scroll-reveal-end="top 92%"

  <app-tech-stack-stack-group
    data-scroll-reveal
    data-scroll-reveal-start="top 140%"
    data-scroll-reveal-end="top 86%"

  ></app-tech-stack-stack-group>

  <app-tech-stack-stack-group
