@for (item of group().items; track item.src) {
  <div
    [class]="itemClass()"
    [class.tech-stage__item--material-design]="item.alt === 'Material Design'"
  >
    <img
      [class]="iconClass()"
      [class.tech-stage__icon--git]="item.alt === 'Git'"
      [class.tech-stage__icon--threejs]="item.alt === 'Three.js'"
      [src]="item.src"
      width="60"
      height="60"
      [alt]="item.alt"
      loading="lazy"
      decoding="async"
    />

    <span [class]="labelClass()" aria-hidden="true">
      @for (letter of item.letters; track $index) {
        <span
          class="tech-stage__label-letter"
          [class.tech-stage__label-space]="letter === ' '"
        >{{ letter }}</span>
      }
    </span>
  </div>
}

<span [class]="groupLabelClass()">
  @for (letter of group().groupLabel.letters; track $index) {
    <span [class.tech-stage__group-label-space]="letter === ' '">{{ letter }}</span>
  }
</span>
