<div class="tech-stage__learning-icon">
  <img
    class="interactive-icon-hover__icon"
    [src]="item().src"
    [alt]="item().alt"
    loading="lazy"
    decoding="async"
  />
</div>

<span class="tech-stage__label tech-stage__learning-label interactive-icon-hover__label">
  @for (letter of item().letters; track $index) {
    <span class="tech-stage__label-letter interactive-icon-hover__letter">{{ letter }}</span>
  }
</span>
