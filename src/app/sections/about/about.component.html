<div class="about-stage">
  <div #scrollSpace class="about-stage__scroll-space">
    <span id="about-intro" class="about-stage__anchor" aria-hidden="true"></span>

    <div class="about-stage__sticky">
      <div class="about-stage__viewport" [attr.aria-label]="content().viewportAriaLabel">
        <div
          #introChapter
          class="about-stage__chapter about-stage__chapter--intro"
        >
          <div class="about-stage__scene about-stage__scene--intro">
            <app-about-text-block
              [block]="introVision()"
            ></app-about-text-block>

            <app-about-image [image]="portrait()"></app-about-image>

            <div class="about-stage__intro-copy-column">
              <app-about-text-block
                [block]="introLead()"
              ></app-about-text-block>

              <app-about-text-block
                [block]="introSecondary()"
              ></app-about-text-block>
            </div>
          </div>
        </div>

        <div
          #contextChapter
          class="about-stage__chapter about-stage__chapter--context"
        >
          <div class="about-stage__scene about-stage__scene--context">
            <div class="about-stage__context-rail">
              <app-about-text-block
                [block]="contextLeft()"
              ></app-about-text-block>

              <div class="about-stage__context-bottom">
                <app-about-text-block
                  [block]="contextBottomHead()"
                ></app-about-text-block>

                <div class="about-stage__context-bottom-row">
                  <app-about-text-block
                    [block]="contextRight()"
                  ></app-about-text-block>

                  <app-about-text-block
                    [block]="contextCenter()"
                  ></app-about-text-block>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
