<div class="section__inner about-stage">
  <div class="about-stage__chapter about-stage__chapter--intro">
    <div class="about-stage__image-zone">
      <img
        class="about-stage__image"
        src="assets/images/about/sebastian-about-640.jpg"
        srcset="
          assets/images/about/sebastian-about-320.jpg 320w,
          assets/images/about/sebastian-about-480.jpg 480w,
          assets/images/about/sebastian-about-640.jpg 640w,
          assets/images/about/sebastian-about-960.jpg 960w
        "
        sizes="(max-width: 48rem) calc(100vw - 2rem), 30rem"
        width="640"
        height="1441"
        decoding="async"
        alt="Sebastian Hedwig in einer ruhigen persönlichen Szene"
      />
    </div>

    <div class="about-stage__text-rail">
      <app-about-text-block
        [block]="introLead"
      ></app-about-text-block>

      <app-about-text-block
        [block]="introSecondary"
      ></app-about-text-block>
    </div>
  </div>

  <div class="about-stage__chapter about-stage__chapter--context">
    <div class="about-stage__context-rail">
      <app-about-text-block
        [block]="contextLeft"
      ></app-about-text-block>

      <app-about-text-block
        [block]="contextCenter"
      ></app-about-text-block>

      <app-about-text-block
        [block]="contextRight"
      ></app-about-text-block>
    </div>
  </div>
</div>
