<div class="about-stage">
  <div
    #scrollSpace
    class="about-stage__scroll-space"
    [style.--about-stage-scenes]="sceneCount"
  >
    <div class="about-stage__sticky">
      <div class="section__inner about-stage__viewport" aria-label="About-Sequenz">
        <div
          class="about-stage__chapter about-stage__chapter--intro"
          [style.opacity]="introState().opacity"
          [style.pointer-events]="introState().pointerEvents"
          [style.transform]="introState().transform"
          [style.z-index]="introState().zIndex"
        >
          <app-about-image [image]="portrait"></app-about-image>

          <div class="about-stage__text-rail">
            <app-about-text-block
              [block]="introLead"
            ></app-about-text-block>

            <app-about-text-block
              [block]="introSecondary"
            ></app-about-text-block>
          </div>
        </div>

        <div
          class="about-stage__chapter about-stage__chapter--context"
          [style.opacity]="contextState().opacity"
          [style.pointer-events]="contextState().pointerEvents"
          [style.transform]="contextState().transform"
          [style.z-index]="contextState().zIndex"
        >
          <div class="about-stage__context-rail">
            <app-about-text-block
              [block]="contextLeft"
            ></app-about-text-block>

            <app-about-text-block
              [block]="contextCenter"
            ></app-about-text-block>

            <app-about-text-block
              [block]="contextRight"
            ></app-about-text-block>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
