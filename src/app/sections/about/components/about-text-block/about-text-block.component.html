@if (block().titleTag === 'h2') {
  <h2 id="about-title" [class]="block().titleClass">
    @for (line of titleLines(); track line + $index) {
      <span>{{ line }}</span>
    }
  </h2>
} @else {
  <p [class]="block().titleClass">
    @for (line of titleLines(); track line + $index) {
      <span>{{ line }}</span>
    }
  </p>
}

<p [class]="block().copyClass">
  @for (segment of copySegments(); track segment.text + $index) {
    <span [class.about-stage__copy-accent]="segment.accent">{{ segment.text }}</span>
  }
</p>
