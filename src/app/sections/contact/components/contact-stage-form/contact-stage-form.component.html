<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
  <label class="contact-stage__field" for="contact-name">
    <span class="contact-stage__field-label">{{ content().form.name.label }}</span>
    <input
      id="contact-name"
      class="contact-stage__input"
      type="text"
      name="name"
      autocomplete="name"
      formControlName="name"
      maxlength="50"
      [placeholder]="content().form.name.placeholder"
    >
    @if (showError(form.controls.name)) {
      <span class="contact-stage__field-error">
        @if (form.controls.name.hasError('required')) {
          {{ content().form.name.requiredError }}
        } @else if (form.controls.name.hasError('maxlength')) {
          {{ content().form.name.maxlengthError }}
        }
      </span>
    }
  </label>

  <label class="contact-stage__field" for="contact-email">
    <span class="contact-stage__field-label">{{ content().form.email.label }}</span>
    <input
      id="contact-email"
      class="contact-stage__input"
      type="email"
      name="email"
      autocomplete="email"
      formControlName="email"
      [placeholder]="content().form.email.placeholder"
    >
    @if (showError(form.controls.email)) {
      <span class="contact-stage__field-error">
        @if (form.controls.email.hasError('required')) {
          {{ content().form.email.requiredError }}
        } @else if (form.controls.email.hasError('blockedDomain')) {
          {{ content().form.email.blockedDomainError }}
        } @else if (form.controls.email.hasError('email')) {
          {{ content().form.email.emailError }}
        }
      </span>
    }
  </label>

  <label class="contact-stage__field" for="contact-subject">
    <span class="contact-stage__field-label">{{ content().form.subject.label }}</span>
    <input
      id="contact-subject"
      class="contact-stage__input"
      type="text"
      name="subject"
      formControlName="subject"
      maxlength="100"
      [placeholder]="content().form.subject.placeholder"
    >
    @if (showError(form.controls.subject)) {
      <span class="contact-stage__field-error">
        @if (form.controls.subject.hasError('required')) {
          {{ content().form.subject.requiredError }}
        } @else if (form.controls.subject.hasError('maxlength')) {
          {{ content().form.subject.maxlengthError }}
        }
      </span>
    }
  </label>

  <label class="contact-stage__field contact-stage__field--message" for="contact-message">
    <span class="contact-stage__field-label">{{ content().form.message.label }}</span>
    <textarea
      id="contact-message"
      class="contact-stage__input contact-stage__input--textarea"
      name="message"
      rows="5"
      formControlName="message"
      maxlength="800"
      [placeholder]="content().form.message.placeholder"
    ></textarea>
    <span
      class="contact-stage__field-meta"
      [style.opacity]="messageLength() > 0 ? 0.72 : 0.38"
    >
      {{ messageLength() }} / {{ messageMaxLength }} {{ content().form.message.counterSuffix }}
    </span>
    @if (showError(form.controls.message)) {
      <span class="contact-stage__field-error">
        @if (form.controls.message.hasError('required')) {
          {{ content().form.message.requiredError }}
        } @else if (form.controls.message.hasError('minlength')) {
          {{ content().form.message.minlengthError }}
        } @else if (form.controls.message.hasError('maxlength')) {
          {{ content().form.message.maxlengthError }}
        }
      </span>
    }
  </label>

  <div class="contact-stage__consent-wrap">
    <label class="contact-stage__consent" for="contact-consent">
      <input
        id="contact-consent"
        class="contact-stage__consent-input"
        type="checkbox"
        name="privacy-consent"
        formControlName="consent"
      >
      <span class="contact-stage__consent-box" aria-hidden="true"></span>
      <span class="contact-stage__consent-text">
        {{ content().consentPrefix }}
        <a
          class="contact-stage__consent-link"
          [href]="content().consentHref"
          target="_blank"
          rel="noopener noreferrer"
        >
          {{ content().consentLinkLabel }}
        </a>{{ content().consentMiddle }}<br>{{ content().consentSuffix }}
      </span>
    </label>
    @if (showError(form.controls.consent)) {
      <span class="contact-stage__field-error contact-stage__field-error--consent">
        {{ content().form.consentError }}
      </span>
    }
  </div>

  <app-primary-button
    class="contact-stage__submit"
    [label]="content().submitLabel"
    type="submit"
    [disabled]="form.invalid"
  />
</form>
