<p class="stage-shell__eyebrow contact-stage__eyebrow">{{ content().eyebrow }}</p>
<h2 id="contact-title" class="stage-shell__title contact-stage__title">{{ content().title }}</h2>

<div class="contact-stage__copy">
  @for (paragraph of content().copy; track $index) {
    <p
      class="contact-stage__paragraph"
      [class.contact-stage__paragraph--mobile-inline]="$index === 0"
    >{{ paragraph }}</p>
  }
</div>

<app-primary-button
  class="contact-stage__cv-link"
  [href]="content().cvHref"
  [label]="content().cvLinkLabel"
  [hoverLabel]="content().cvHoverLabel"
/>

<div class="contact-stage__roles">
  <p class="contact-stage__roles-label">{{ content().roles.label }}</p>
  <ul class="contact-stage__roles-list">
    @for (role of content().roles.items; track role) {
      <li class="contact-stage__roles-item">{{ role }}</li>
    }
  </ul>
</div>
