<header class="stage-shell__header projects-stage__header">
  <p class="stage-shell__eyebrow">{{ eyebrow() }}</p>
  <h2 class="stage-shell__title projects-stage__title">
    @for (line of titleLines(); track line) {
      <span class="projects-stage__title-line">{{ line }}</span>
    }
  </h2>
  <p class="stage-shell__lead">{{ lead() }}</p>
</header>
