<article class="project-moment">
  <div class="project-moment__scene">
    <div class="project-moment__main">
      <app-projects-stage-content
        [index]="project().index"
        [eyebrow]="project().eyebrow"
        [title]="project().title"
        [summary]="project().summary"
      ></app-projects-stage-content>

      <app-projects-stage-visual
        [label]="project().visualLabel"
        [copy]="project().visualCopy"
      ></app-projects-stage-visual>
    </div>

    <app-projects-stage-details
      [details]="project().details"
    ></app-projects-stage-details>
  </div>
</article>
