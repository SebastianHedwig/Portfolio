<div class="project-moment__stack">
  <h4 class="project-moment__stack-label">{{ stack().label }}</h4>
  @if (stack().icons?.length) {
    <div class="project-moment__stack-icons" aria-label="{{ stack().value }}">
      @for (icon of stack().icons; track icon.src) {
        <div class="project-moment__stack-item">
          <img
            class="project-moment__stack-icon"
            [src]="icon.src"
            width="60"
            height="60"
            [alt]="icon.alt"
            loading="lazy"
            decoding="async"
          >
          <span class="project-moment__stack-icon-label" aria-hidden="true">
            @for (letter of icon.alt.split(''); track $index) {
              <span class="project-moment__stack-icon-label-letter">{{ letter }}</span>
            }
          </span>
        </div>
      }
    </div>
  } @else {
    <p class="project-moment__stack-value">{{ stack().value }}</p>
  }
</div>
