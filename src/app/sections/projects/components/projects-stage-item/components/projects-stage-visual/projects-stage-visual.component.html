<div class="project-moment__visual-shell" [class]="ambientClass()">
  @if (visual(); as image) {
    <img
      class="project-moment__visual-image"
      [src]="image.src"
      [attr.width]="image.width"
      [attr.height]="image.height"
      [alt]="image.alt"
      loading="lazy"
      decoding="async"
    >
  }
</div>
