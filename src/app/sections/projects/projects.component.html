<div class="projects-stage">
  <div
    #scrollSpace
    class="projects-stage__scroll-space"
    [style.--projects-stage-scenes]="sceneCount"
  >
    <div class="projects-stage__sticky">
      <div class="projects-stage__viewport" aria-label="Projektsequenz">
        <div
          class="projects-stage__entry"
          [style.opacity]="entryState().opacity"
          [style.pointer-events]="entryState().pointerEvents"
          [style.transform]="entryState().transform"
          [style.z-index]="entryState().zIndex"
        >
          <header class="stage-shell__header projects-stage__header">
            <p class="stage-shell__eyebrow">{{ entryEyebrow }}</p>
            <h2 class="stage-shell__title">{{ entryTitle }}</h2>
            <p class="stage-shell__lead">{{ entryLead }}</p>
          </header>
        </div>

        @for (panel of projectPanels(); track panel.project.index) {
          <app-projects-stage-item
            [project]="panel.project"
            [state]="panel.state"
          ></app-projects-stage-item>
        }
      </div>
    </div>
  </div>
</div>
