<div class="hero-description">
  <p class="hero-description__eyebrow">{{ content().eyebrow }}</p>

  <h1 class="hero-description__headline">
    @for (line of content().headlineLines; track $index) {
      <span [class.hero-description__headline-line--accent]="isAccentLine(line)">{{ line }}</span>
    }
  </h1>

  <p class="hero-description__text">
    {{ content().text }}
  </p>

  <div class="hero-description__actions">
    <app-primary-button
      [href]="content().action.href"
      [label]="content().action.label"
    ></app-primary-button>
  </div>
</div>
