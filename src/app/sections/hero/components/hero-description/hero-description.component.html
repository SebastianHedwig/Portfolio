<div class="hero-description">
  <p class="hero-description__eyebrow">{{ content().eyebrow }}</p>

  <h1 id="hero-title" class="hero-description__headline">
    @for (line of headlineLines(); track $index) {
      <span>
        @for (segment of line; track $index) {
          <span [class.hero-description__headline-line--accent]="segment.isAccent">{{ segment.text }}</span>
        }
      </span>
    }
  </h1>

  <p class="hero-description__text">
    {{ content().text }}
  </p>

  <div class="hero-description__actions">
    <app-primary-button
      [href]="content().action.href"
      [label]="content().action.label"
    ></app-primary-button>
  </div>
</div>
