<div class="hero-portrait">
  <div class="hero-portrait__image-shell">
    <picture>
      <source
        [srcset]="content().mobileWebpSrc"
        media="(max-width: 760px) and (orientation: portrait)"
        type="image/webp"
      />
      <source [srcset]="content().webpSrc" type="image/webp" />
      <img
        class="hero-portrait__image"
        [src]="content().src"
        [width]="content().width"
        [height]="content().height"
        [alt]="content().alt"
        loading="eager"
        decoding="async"
        fetchpriority="high"
      />
    </picture>
  </div>
</div>
